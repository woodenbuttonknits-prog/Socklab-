<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SockLab</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      background: white;
      padding: 15px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      margin-bottom: 20px;
      text-align: left;
    }

    .controls label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }

    .controls select,
    .controls input {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .sock {
      width: 120px;
      height: 360px;
      margin: 20px auto;
      background: white;
      border-radius: 100px 100px 30px 30px;
      overflow: hidden;
      border: 2px solid #333;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .band {
      display: grid;
      justify-content: center;
      margin: 4px 0;
    }

    .cell {
      width: 6px;
      height: 6px;
      margin: 0.5px;
      border-radius: 1px;
    }

    .heel {
      position: absolute;
      bottom: 60px;
      left: 0;
      width: 60px;
      height: 60px;
      background: #ddd;
      border-radius: 20px;
    }

    .foot {
      height: 50px;
      background: #eee;
      border-radius: 0 0 20px 20px;
    }

    #patternOutput {
      text-align: left;
      white-space: pre-wrap;
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div class="controls">
  <label>Size system</label>
  <select id="sizeSystem">
    <option value="EU">EU</option>
    <option value="US">US</option>
  </select>

  <label>Size</label>
  <input id="size" type="number" value="38" />

  <label>Yarn weight</label>
  <select id="yarn">
    <option value="fingering">Fingering</option>
    <option value="dk">DK</option>
    <option value="worsted">Worsted</option>
  </select>

  <label>Needle size (mm)</label>
  <input id="needle" type="number" value="2.5" step="0.5" />

  <label>Construction</label>
  <select id="construction">
    <option value="top-down">Top-down</option>
    <option value="toe-up">Toe-up</option>
  </select>

  <label>Heel type</label>
  <select id="heel">
    <option value="flap">Heel flap</option>
    <option value="short-row">Short row</option>
  </select>

  <label>Theme (colorwork)</label>
  <select id="theme">
    <option value="bee">Bee</option>
  </select>

  <button id="generateBtn">Generate Sock</button>
</div>

<div id="sock" class="sock"></div>

<pre id="patternOutput"></pre>

<script type="module">
  import { generateSock } from "./src/generator/generator.js";
  import { buildInstructions } from "./src/patterns/instructionBuilder.js";

  const container = document.getElementById("sock");
  const output = document.getElementById("patternOutput");

  function getInputs() {
    return {
      sizeSystem: document.getElementById("sizeSystem").value,
      size: Number(document.getElementById("size").value),
      yarn: document.getElementById("yarn").value,
      needle: Number(document.getElementById("needle").value),
      construction: document.getElementById("construction").value,
      heel: document.getElementById("heel").value,
      themeName: document.getElementById("theme").value
    };
  }

  function renderSock() {
    const config = getInputs();

    console.log("INPUT:", config);

    const sock = generateSock(config);

    container.innerHTML = "";

    const leg = sock.sections?.leg || sock.structure || [];

    leg.forEach(pattern => {
      if (!pattern || !pattern.chart) return;

      const band = document.createElement("div");
      band.className = "band";

      const chart = pattern.chart;
      band.style.gridTemplateColumns = `repeat(${chart[0].length}, 6px)`;

      for (let r = 0; r < (pattern.rounds || 6); r++) {
        chart.forEach(row => {
          row.split("").forEach(cell => {
            const div = document.createElement("div");
            div.className = "cell";

            div.style.background =
              cell === "X"
                ? pattern.colors?.[0] || "black"
                : pattern.colors?.[1] || "#ddd";

            band.appendChild(div);
          });
        });
      }

      container.appendChild(band);
    });

    const heel = document.createElement("div");
    heel.className = "heel";
    container.appendChild(heel);

    const foot = document.createElement("div");
    foot.className = "foot";
    container.appendChild(foot);

    const instructions = buildInstructions(sock);
    output.textContent = instructions;
  }

  renderSock();

  document
    .getElementById("generateBtn")
    .addEventListener("click", renderSock);
</script>

</body>
</html>
