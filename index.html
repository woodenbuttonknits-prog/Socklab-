<!DOCTYPE html>
<html>
<head>
  <title>Sock Preview</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .sock {
      width: 200px;
      margin: auto;
      border: 2px solid #333;
    }

    .band {
      display: grid;
    }

    .cell {
      width: 10px;
      height: 10px;
    }
  </style>
</head>
<body>

<h2>🧦 Sock Preview</h2>

<div id="sock" class="sock"></div>

<script type="module">
import { generateSock } from "./src/generator/generator.js";

const sockData = generateSock();
console.log(sockData.structure);
const container = document.getElementById("sock");

sockData.structure.forEach(pattern => {
  const band = document.createElement("div");
  band.className = "band";

  const chart = pattern.chart;

  if (!chart) return;

  band.style.gridTemplateColumns = `repeat(${chart[0].length}, 10px)`;

  chart.forEach(row => {
    row.split("").forEach(cell => {
      const div = document.createElement("div");
      div.className = "cell";

      if (cell === "X") {
        div.style.background = pattern.colors[0];
      } else {
        div.style.background = pattern.colors[1];
      }

      band.appendChild(div);
    });
  });

  container.appendChild(band);
});
</script>

</body>
</html>
