<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SockLab</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    .sock {
      width: 120px;
      height: 360px;
      margin: 20px auto;
      background: white;
      border-radius: 100px 100px 30px 30px;
      overflow: hidden;
      border: 2px solid #333;
      position: relative;
    }

    .band {
      display: grid;
      justify-content: center;
      margin: 4px 0;
    }

    .cell {
      width: 6px;
      height: 6px;
      margin: 0.5px;
      border-radius: 1px;
    }

    #patternOutput {
      text-align: left;
      white-space: pre-wrap;
      max-width: 400px;
      margin: 20px auto;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div>
  <label>Size</label>
  <input id="size" type="number" value="38" />

  <label>Theme</label>
  <select id="theme">
    <option value="bee">Bee</option>
  </select>
</div>

<button id="generateBtn">Generate Sock</button>

<div id="sock" class="sock"></div>

<pre id="patternOutput"></pre>

<script type="module">
  import { generateSock } from "./src/generator/generator.js";
  import { buildInstructions } from "./src/patterns/instructionBuilder.js";

  function getInputs() {
    return {
        size: Number(document.getElementById("size").value),
        themeName: document.getElementById("theme").value
    };
  }

  const container = document.getElementById("sock");
  const output = document.getElementById("patternOutput");

  function renderSock() {
    console.log("RENDER START");

    const config = getInputs();

    const sock = generateSock(config);

    console.log("SOCK:", sock);

    container.innerHTML = "";

    const leg = sock.sections?.leg || sock.structure || [];

    console.log("LEG:", leg);

    leg.forEach(pattern => {
      if (!pattern || !pattern.chart) return;

      const band = document.createElement("div");
      band.className = "band";

      const chart = pattern.chart;

      const width = pattern.width || chart[0].length;

      band.style.gridTemplateColumns = `repeat(${width}, 6px)`;

      for (let r = 0; r < (pattern.rounds || 6); r++) {
        chart.forEach(row => {
          row.split("").forEach(cell => {
            const div = document.createElement("div");
            div.className = "cell";

            div.style.background =
              cell === "X"
                ? pattern.colors?.[0] || "black"
                : pattern.colors?.[1] || "#eee";

            band.appendChild(div);
          });
        });
      }

      container.appendChild(band);
    });

    const instructions = buildInstructions(sock);
    output.textContent = instructions;
  }

  renderSock();

  document
    .getElementById("generateBtn")
    .addEventListener("click", renderSock);
</script>

</body>
</html>
