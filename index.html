<script>

// DEMO (later vervangen door generator)
const svg = document.getElementById("patternGroup");
svg.innerHTML = "";

const demoPattern = {
  chart: [
    "00110011",
    "01100110",
    "11000011",
    "01100110"
  ]
};

function drawCell(x, y, size, color) {
  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

  rect.setAttribute("x", x);
  rect.setAttribute("y", y);
  rect.setAttribute("width", size);
  rect.setAttribute("height", size);
  rect.setAttribute("fill", color);

  svg.appendChild(rect);
}

const colors = {
  main: "#f2c200",
  contrast: "#000",
  bg: "#ffffff"
};

function buildPattern(chart) {

  const size = 6;
  const width = chart[0].length * size;
  const height = chart.length * size;

  let rects = "";

  chart.forEach((row, y) => {
    row.split("").forEach((cell, x) => {

      let color = cell === "1"
        ? colors.main
        : colors.bg;

      rects += `
        <rect 
          x="${x * size}" 
          y="${y * size}" 
          width="${size}" 
          height="${size}" 
          fill="${color}" />
      `;
    });
  });

  return `
    <pattern id="sockPattern"
      patternUnits="userSpaceOnUse"
      width="${width}"
      height="${height}">
      ${rects}
    </pattern>
  `;
}

function generate() {

  const defs = document.getElementById("patternDefs");

  // reset
  defs.innerHTML = "";

  // één patroon voor hele sok
  defs.innerHTML = buildPattern(demoPattern.chart);

  document.getElementById("patternText").innerText =
`Cast on 72 stitches.
Work in pattern.
Heel and toe shaping included.`;
}

// initial render
generate();

</script>
