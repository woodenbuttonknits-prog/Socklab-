<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SockLab</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-top: 10px;
    margin-bottom: 20px;
  }

  .controls {
    margin: 20px 0 30px;
  }

  input, select, button {
    padding: 8px;
    font-size: 16px;
    margin: 5px;
  }

  .sock-stage {
    display: flex;
    justify-content: center;
    margin: 20px auto 30px;
  }

  .sock-stage img {
    width: 378px;
    height: auto;
    display: block;
  }

  .pattern-box {
    margin: 30px auto;
    padding: 20px;
    width: min(420px, calc(100vw - 40px));
    background: #eee;
    border-radius: 10px;
    text-align: left;
    white-space: pre-line;
    box-sizing: border-box;
  }
</style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div class="controls">
  Size <input id="size" value="38" />
  Theme
  <select id="theme">
    <option value="bee">Bee</option>
  </select>

  <br/>
  <button onclick="generate()">Generate Sock</button>
</div>
<g id="patternLayer" clip-path="url(#sockClip)"></g>
<svg id="sockSVG" viewBox="0 0 378 567">
  <!-- je sock path -->
  <!-- je defs + clippath -->
  <g id="patternLayer"></g>
</svg>
<div class="sock-stage">
  <img src="sock.svg" alt="Sock preview" />
</div>

<div id="patternText" class="pattern-box"></div>

<script>
const svg = document.getElementById("patternLayer");

const CELL = 6;

// kleuren
const colors = {
  main: "#f2c200",
  bg: "#ffffff",
  heel: "#d9b38c"
};

// demo patroon
const pattern = [
  "10101010",
  "01010101"
];

// --- ZONE DETECTIE ---
function getZone(x, y) {

  if (y < 120) return "leg";

  if (y < 200) return "transition";

  if (x < 140 && y > 180 && y < 320) return "heel";

  if (y >= 200 && y < 420) return "foot";

  if (y >= 420) return "toe";

  return "leg";
}

// --- ROTATIE PER ZONE ---
function getRotation(zone) {
  switch(zone) {
    case "foot": return 25;
    case "transition": return 15;
    default: return 0;
  }
}

// --- TRANSFORMATIE ---
function transformPoint(x, y, angleDeg) {

  const angle = angleDeg * Math.PI / 180;

  return {
    x: x * Math.cos(angle) - y * Math.sin(angle),
    y: x * Math.sin(angle) + y * Math.cos(angle)
  };
}

// --- CELL TEKENEN ---
function drawCell(x, y, color) {

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

  rect.setAttribute("x", x);
  rect.setAttribute("y", y);
  rect.setAttribute("width", CELL);
  rect.setAttribute("height", CELL);
  rect.setAttribute("fill", color);

  svg.appendChild(rect);
}

// --- MAIN RENDER ---
function renderPattern() {

  svg.innerHTML = "";

  const width = 378;
  const height = 567;

  const cols = Math.ceil(width / CELL);
  const rows = Math.ceil(height / CELL);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      const px = x * CELL;
      const py = y * CELL;

      const zone = getZone(px, py);
      const rotation = getRotation(zone);

      const p = transformPoint(px, py, rotation);

      let color;

      if (zone === "heel") {
        color = colors.heel;
      } else {
        const row = pattern[y % pattern.length];
        const cell = row[x % row.length];
        color = cell === "1" ? colors.main : colors.bg;
      }

      drawCell(p.x, p.y, color);
    }
  }
}

// INIT
renderPattern();


function generate() {
  const size = document.getElementById("size").value;
  const theme = document.getElementById("theme").value;

  document.getElementById("patternText").innerText =
`Sock preview loaded from desok.svg

Size: ${size}
Theme: ${theme}

Cast on 72 stitches.
Work in pattern.
Heel and toe shaping included.`;
}

generate();
</script>

</body>
</html>
