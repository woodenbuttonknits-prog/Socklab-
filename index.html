<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SockLab</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.controls {
  margin: 20px;
}

input, select, button {
  padding: 8px;
  font-size: 16px;
  margin: 5px;
}

svg {
  margin-top: 20px;
}

.pattern-box {
  margin: 30px auto;
  padding: 20px;
  width: 320px;
  background: #eee;
  border-radius: 10px;
  text-align: left;
  white-space: pre-line;
}
</style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div class="controls">
  Size <input id="size" value="38" />
  Theme 
  <select id="theme">
    <option value="bee">Bee</option>
  </select>

  <br/>
  <button onclick="generate()">Generate Sock</button>
</div>

<div class="sock-container">

  <!-- jouw SVG hier plakken -->
  <svg id="sockSVG" viewBox="0 0 200 400">

    <defs>
      <clipPath id="sockClip">
        <path d="PASTE_HIER_JOUW_PATH"/>
      </clipPath>
    </defs>

    <!-- dit blijft je outline -->
    <path d="PASTE_HIER_JOUW_PATH" fill="white" stroke="#333" stroke-width="3"/>

    <!-- HIER komt je patroon -->
    <g id="patternGroup" clip-path="url(#sockClip)"></g>

  </svg>

</div>

<div id="patternText" class="pattern-box"></div>

<script>

// DEMO (later vervangen door generator)
const demoPattern = {
  chart: [
    "00110011",
    "01100110",
    "11000011",
    "01100110"
  ]
};

const colors = {
  main: "#f2c200",
  contrast: "#000",
  bg: "#ffffff"
};

function buildPattern(chart) {

  const size = 6;
  const width = chart[0].length * size;
  const height = chart.length * size;

  let rects = "";

  chart.forEach((row, y) => {
    row.split("").forEach((cell, x) => {

      let color = cell === "1"
        ? colors.main
        : colors.bg;

      rects += `
        <rect 
          x="${x * size}" 
          y="${y * size}" 
          width="${size}" 
          height="${size}" 
          fill="${color}" />
      `;
    });
  });

  return `
    <pattern id="sockPattern"
      patternUnits="userSpaceOnUse"
      width="${width}"
      height="${height}">
      ${rects}
    </pattern>
  `;
}

function generate() {

  const defs = document.getElementById("patternDefs");

  // reset
  defs.innerHTML = "";

  // één patroon voor hele sok
  defs.innerHTML = buildPattern(demoPattern.chart);

  document.getElementById("patternText").innerText =
`Cast on 72 stitches.
Work in pattern.
Heel and toe shaping included.`;
}

// initial render
generate();

</script>

</body>
</html>
