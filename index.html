<script>

const svg = document.getElementById("patternLayer");

const WIDTH = 300;
const HEIGHT = 500;
const CELL = 5;

// kleuren
const colors = {
  main: "#f2c200",
  bg: "transparent",
  heel: "#d9b38c"
};

// patroon
const pattern = [
  "10101010",
  "01010101"
];

// --- ZONES (AANGEPAST NAAR 300x500) ---
function getZone(x, y) {

  if (y < 120) return "leg";

  if (y < 200) return "transition";

  if (x < 120 && y > 180 && y < 320) return "heel";

  if (y >= 200 && y < 420) return "foot";

  return "toe";
}

// --- ROTATIE ---
function getRotation(zone) {
  switch(zone) {
    case "foot": return 25;
    case "transition": return 12;
    default: return 0;
  }
}

// --- TRANSFORM MET ANKERPUNT (BELANGRIJK) ---
function transformPoint(x, y, angleDeg) {

  const angle = angleDeg * Math.PI / 180;

  // 👉 rotatie rond enkel (center-ish punt)
  const anchorX = 150;
  const anchorY = 220;

  const dx = x - anchorX;
  const dy = y - anchorY;

  return {
    x: anchorX + (dx * Math.cos(angle) - dy * Math.sin(angle)),
    y: anchorY + (dx * Math.sin(angle) + dy * Math.cos(angle))
  };
}

// --- DRAW ---
function drawCell(x, y, color) {

  if (color === "transparent") return;

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

  rect.setAttribute("x", x);
  rect.setAttribute("y", y);
  rect.setAttribute("width", CELL);
  rect.setAttribute("height", CELL);
  rect.setAttribute("fill", color);

  svg.appendChild(rect);
}

// --- MAIN RENDER ---
function renderPattern() {

  svg.innerHTML = "";

  const cols = Math.ceil(WIDTH / CELL);
  const rows = Math.ceil(HEIGHT / CELL);

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {

      const px = x * CELL;
      const py = y * CELL;

      const zone = getZone(px, py);
      const rotation = getRotation(zone);

      const p = transformPoint(px, py, rotation);

      let color;

      if (zone === "heel") {
        color = colors.heel;
      } else {
        const row = pattern[y % pattern.length];
        const cell = row[x % row.length];
        color = cell === "1" ? colors.main : colors.bg;
      }

      drawCell(p.x, p.y, color);
    }
  }
}

// init
renderPattern();

function downloadAdjustedHtml() {
  const html = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "socklab-aangepast.html";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  URL.revokeObjectURL(url);
}

</script>
