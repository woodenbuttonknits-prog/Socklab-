  <script>

    const svg = document.getElementById("patternLayer");

    const clipPathElement = document.getElementById("sockClipPath");
    const outlinePathElement = document.getElementById("sockOutline");

    // De bron-SVG bevat 2 subpaden (buiten + binnen), wat een ring/boord als clip geeft.
    // We gebruiken alleen het buitenste pad zodat de hele sok gevuld wordt.
    const rawSockPath = clipPathElement?.getAttribute("d") || "";
    const splitMarker = " Z M";
    const markerIndex = rawSockPath.indexOf(splitMarker);

    if (markerIndex !== -1) {
      const outerSockPath = `${rawSockPath.slice(0, markerIndex + 2)}`;
      clipPathElement.setAttribute("d", outerSockPath);
      outlinePathElement?.setAttribute("d", outerSockPath);
    }


    const WIDTH = 300;
    const HEIGHT = 500;
    const CELL = 5;

    // kleuren
    const colors = {
      main: "#f2c200",
      bg: "transparent",
      heel: "#d9b38c"
    };
    
    const DEBUG_ZONES = true;
    const zoneColors = {
      cuff: "#ff4d4f",
      leg: "#52c41a",
      heel: "#2f54eb",
      foot: "#fadb14",
      toe: "#eb2f96"
    };

    // patroon
    const pattern = [
      "10101010",
      "01010101"
    ];
    
    // --- DYNAMISCHE ZONES (ANATOMY-BASED) ---
    const sockModel = {
      cuff: 0.08,
      leg: 0.37,
      heel: 0.20,
      foot: 0.30,
      toe: 0.10
    };

    function createSockGeometry(width, height) {
      const cuffEnd = sockModel.cuff * height;
      const legEnd = cuffEnd + sockModel.leg * height;
      const heelStart = legEnd;
      const heelEnd = heelStart + (height * 0.20);
      const toeStart = height - (sockModel.toe * height);

      return {
        cuffEnd,
        legEnd,
        heelStart,
        heelEnd,
        toeStart
      };
    }

    function isToe(x, y, width, height) {
      const centerX = width * 0.25;
      const centerY = height * 0.85;
      const radiusX = width * 0.42;
      const radiusY = height * 0.16;
      const dx = (x - centerX) / radiusX;
      const dy = (y - centerY) / radiusY;

      return (dx * dx + dy * dy) < 1;
    }

    function heelCurve(y, width, height) {
      const { heelStart, heelEnd } = createSockGeometry(width, height);
      const t = (y - heelStart) / (heelEnd - heelStart);

      // stronger outward push
      return width * (0.45 + 0.35 * t);
    }

    function isHeel(x, y, width, height) {
      const { heelStart, heelEnd } = createSockGeometry(width, height);
      if (y < heelStart || y > heelEnd) return false;
      return x > heelCurve(y, width, height);
    }

    function getZone(x, y, width, height) {
      const { cuffEnd, legEnd } = createSockGeometry(width, height);

      if (isToe(x, y, width, height)) return "toe";
      if (isHeel(x, y, width, height)) return "heel";
      if (y < cuffEnd) return "cuff";
      if (y < legEnd) return "leg";
      return "foot";
    }

    function renderBandMapping() {
      const legend = document.getElementById("bandMapping");
      if (!legend) return;
      const { cuffEnd, legEnd, heelStart, heelEnd, toeStart } = createSockGeometry(WIDTH, HEIGHT);


      legend.innerHTML = `
        <strong>Zone mapping (dynamic anatomy model)</strong><br/>
        Cuff: y &lt; ${Math.round(cuffEnd)}<br/>
        Leg: ${Math.round(cuffEnd)} ≤ y &lt; ${Math.round(legEnd)}<br/>
        Heel: curved area, ${Math.round(heelStart)} &lt; y &lt; ${Math.round(heelEnd)}<br/>
        Foot: default zone between leg and toe<br/>
        Toe: radial zone vanaf y ≈ ${Math.round(toeStart)}
      `;
    }

    // --- ROTATIE ---
    function getRotation(zone) {
      switch (zone) {
        case "foot":
        case "toe":
          return 25;
        default:
          return 0;
      }
    }

    // --- TRANSFORM MET ANKERPUNT (BELANGRIJK) ---
    function transformPoint(x, y, angleDeg) {

      const angle = angleDeg * Math.PI / 180;

      // 👉 rotatie rond enkel (center-ish punt)
      const anchorX = 0;
      const anchorY = 220;

      const dx = x - anchorX;
      const dy = y - anchorY;

      return {
        x: anchorX + (dx * Math.cos(angle) - dy * Math.sin(angle)),
        y: anchorY + (dx * Math.sin(angle) + dy * Math.cos(angle))
      };
    }

    // --- DRAW ---
    function drawCell(x, y, color) {

      if (color === "transparent") return;

      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");

      rect.setAttribute("x", x);
      rect.setAttribute("y", y);
      rect.setAttribute("width", CELL);
      rect.setAttribute("height", CELL);
      rect.setAttribute("fill", color);
      rect.setAttribute("fill-opacity", DEBUG_ZONES ? "0.8" : "1");

      svg.appendChild(rect);
    }

    function getPatternColor(x, y) {
      const row = pattern[y % pattern.length];
      const cell = row[x % row.length];
      return cell === "1" ? colors.main : colors.bg;
    }

    // --- MAIN RENDER ---
    function renderPattern() {

      svg.innerHTML = "";

      const cols = Math.ceil(WIDTH / CELL);
      const rows = Math.ceil(HEIGHT / CELL);
      const zoneSet = new Set();


      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {

          const zoneX = x * CELL;
          const px = zoneX - WIDTH / 2;
          const py = y * CELL;
          const zone = getZone(zoneX, py, WIDTH, HEIGHT) || "foot";
        
          const rotation = getRotation(zone);

          if (DEBUG_ZONES) {
            if (!zoneColors[zone]) {
              console.warn("Unknown zone detected", zone);
            }
          }

          const p = transformPoint(px, py, rotation);

          let fillColor;

          if (DEBUG_ZONES) {
            fillColor = zoneColors[zone] || "#000000";
          } else {
            if (zone === "heel") {
              fillColor = colors.heel;
            } else {
              fillColor = getPatternColor(x, y);
            }
          }

          drawCell(p.x, p.y, fillColor);

      }
    }
    console.log("Zones detected:", Array.from(zoneSet));
    }

    // init
    renderBandMapping();
    renderPattern();

  </script>

</body>

</html>
