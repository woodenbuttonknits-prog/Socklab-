<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SockLab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    .controls {
      margin: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    .sock {
      width: 120px;
      margin: 20px auto;
      background: white;
      border: 3px solid #333;
      border-radius: 30px 30px 100px 100px;
      overflow: hidden;
    }

    .band {
      display: grid;
      justify-content: center;
    }

    .cell {
      width: 6px;
      height: 6px;
    }

    .instructions {
      max-width: 400px;
      margin: 20px auto;
      background: #eee;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>🧦 SockLab</h1>

  <div class="controls">
    Size 
    <input id="size" type="number" value="38" />

    Theme 
    <select id="theme">
      <option value="bee">Bee</option>
    </select>

    <br/>

    <button onclick="renderSock()">Generate Sock</button>
  </div>

  <div id="sock" class="sock"></div>

  <div id="instructions" class="instructions"></div>

  <script type="module">
    import { generateSock } from "./src/generator/generator.js";
    import { buildInstructions } from "./src/patterns/instructionBuilder.js";

    const container = document.getElementById("sock");
    const instructionsBox = document.getElementById("instructions");

    function getInputs() {
      return {
        size: parseInt(document.getElementById("size").value),
        themeName: document.getElementById("theme").value
      };
    }

    window.renderSock = function () {

      const config = getInputs();
      const sock = generateSock(config);

      console.log("SOCK:", sock);

      container.innerHTML = "";

      const ROUND_SCALE = 3;

      // -------------------------
      // CUFF (RIBBING)
      // -------------------------
      const cuff = document.createElement("div");
      cuff.className = "band";

      const cuffWidth = sock.castOn || 60;
      cuff.style.gridTemplateColumns = `repeat(${cuffWidth}, 6px)`;

      const cuffRows = Math.max(1, Math.round(20 / ROUND_SCALE));
for (let r = 0; r < cuffRows; r++) {
        for (let i = 0; i < cuffWidth; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";

          const isKnit = i % 2 === 0;
          cell.style.background = isKnit ? "#bbb" : "#eee";

          cuff.appendChild(cell);
        }
      }

      container.appendChild(cuff);

      // -------------------------
      // LEG (COLORWORK)
      // -------------------------
      const leg = sock.sections?.leg || sock.structure || [];

      leg.forEach(pattern => {

        const chart = pattern.chart || [];
        if (!chart.length) return;

        const band = document.createElement("div");
        band.className = "band";

        const repeat = pattern.repeat || chart[0].length;
        const width = pattern.width || sock.castOn || repeat;
        const repeats = Math.floor(width / repeat);

        band.style.gridTemplateColumns = `repeat(${width}, 6px)`;

        const visualRows = Math.max(
          1,
          Math.floor((pattern.rounds || chart.length || 6) / ROUND_SCALE)
        );

        for (let r = 0; r < visualRows; r++) {
          chart.forEach(row => {

            for (let i = 0; i < repeats; i++) {

              row.split("").forEach(cell => {
                const div = document.createElement("div");
                div.className = "cell";

                div.style.background =
                  cell === "X"
                    ? pattern.colors?.[0] || "black"
                    : pattern.colors?.[1] || "white";

                band.appendChild(div);
              });

            }

          });
        }

        container.appendChild(band);
      });

      // -------------------------
      // HEEL
      // -------------------------
      const heel = document.createElement("div");
      heel.style.height = "40px";
      heel.style.background = "#ccc";
      container.appendChild(heel);

      // -------------------------
      // FOOT
      // -------------------------
      const foot = document.createElement("div");
      foot.style.height = "50px";
      foot.style.background = "#f0f0f0";
      container.appendChild(foot);

      // -------------------------
      // TOE
      // -------------------------
      const toe = document.createElement("div");
      toe.style.height = "40px";
      toe.style.background = "#ddd";
      container.appendChild(toe);

      // -------------------------
      // INSTRUCTIONS
      // -------------------------
      instructionsBox.textContent = buildInstructions(sock);
    };

    // auto render bij laden
    renderSock();

  </script>

</body>
</html>
