<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SockLab</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 20px;
    }

    .controls {
      margin: 20px;
    }

    input, select, button {
      padding: 8px;
      font-size: 16px;
      margin: 5px;
    }

    svg {
      margin-top: 20px;
    }

    .pattern-box {
      margin: 30px auto;
      padding: 20px;
      width: 320px;
      background: #eee;
      border-radius: 10px;
      text-align: left;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div class="controls">
  Size <input id="size" value="38" />
  Theme 
  <select id="theme">
    <option value="bee">Bee</option>
  </select>

  <br/>
  <button onclick="generate()">Generate Sock</button>
</div>

<!-- SVG SOCK -->
<svg width="220" height="420" viewBox="0 0 220 420">

  <defs id="patternDefs">
    <!-- fallback zodat je altijd iets ziet -->
    <pattern id="legPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="yellow"/>
      <rect width="10" height="10" fill="black"/>
    </pattern>

    <pattern id="footPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="yellow"/>
      <circle cx="10" cy="10" r="5" fill="black"/>
    </pattern>
  </defs>

  <!-- CUFF -->
  <rect x="60" y="0" width="100" height="60" fill="#ddd" />

  <!-- LEG -->
  <path 
    d="M60 60 L160 60 L160 220 L60 220 Z"
    fill="url(#legPattern)"
  />

  <!-- FOOT -->
  <path 
    d="M60 220 
       L160 220 
       Q200 260 180 320 
       Q160 360 100 360 
       Q60 360 60 320 
       Z"
    fill="url(#footPattern)"
  />

  <!-- HEEL -->
  <ellipse cx="150" cy="260" rx="30" ry="40" fill="rgba(0,0,0,0.15)" />

  <!-- OUTLINE -->
  <path id="sockOutline"
   d="
M 70,10
L 200,10
L 200,230

C 200,270 235,295 260,305
C 285,315 290,340 260,350

L 120,350

C 80,345 60,315 60,285
L 60,70

C 60,35 70,10 70,10
Z
  "
  fill="none"
  stroke="#333"
  stroke-width="3"
/>

</svg>

<div id="patternText" class="pattern-box"></div>

<script>

// SIMPEL TEST PATROON (vervang later met jouw generator)
const demoPattern = {
  chart: [
    "00110011",
    "01100110",
    "11000011",
    "01100110"
  ]
};

// kleuren
const colors = {
  main: "#f2c200",
  contrast: "#000",
  bg: "#ffffff"
};

// bouw SVG pattern
function buildPattern(id, chart) {
  const size = 6;
  const width = chart[0].length * size;
  const height = chart.length * size;

  let rects = "";

  chart.forEach((row, y) => {
    row.split("").forEach((cell, x) => {

      let color = cell === "1" ? colors.main : colors.bg;

      rects += `
        <rect 
          x="${x * size}" 
          y="${y * size}" 
          width="${size}" 
          height="${size}" 
          fill="${color}" />
      `;
    });
  });

  return `
    <pattern id="${id}" 
      patternUnits="userSpaceOnUse"
      width="${width}" 
      height="${height}">
      ${rects}
    </pattern>
  `;
}

function generate() {

  const defs = document.getElementById("patternDefs");

  // CLEAR
  defs.innerHTML = "";

  // LEG pattern
  defs.innerHTML += buildPattern("legPattern", demoPattern.chart);

  // FOOT pattern (zelfde maar kan later anders)
  defs.innerHTML += buildPattern("footPattern", demoPattern.chart);

  // TEXT (placeholder)
  document.getElementById("patternText").innerText =
`Cast on 72 stitches.
Work in pattern.
Heel and toe shaping included.`;
}

</script>

</body>
</html>
