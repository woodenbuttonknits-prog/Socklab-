<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SockLab</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.controls {
  margin: 20px;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

/* --- SOCK LAYOUT --- */

.sock-wrapper {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin: 30px auto;
  width: 220px;
}

/* LEG */
.sock-leg {
  width: 120px;
  background: white;
  border: 3px solid #333;
  border-bottom: none;
  overflow: hidden;
}

/* HEEL (bocht) */
.sock-heel {
  width: 80px;
  height: 60px;

  background: white;

  border-bottom: 3px solid #333;

  border-radius: 0 0 30px 0;

  margin-left: 40px;
  margin-top: -3px;
}

/* FOOT */
.sock-foot {
  width: 160px;
  background: white;
  border: 3px solid #333;
  border-radius: 0 40px 40px 0;
  border-top: none;
  margin-left: 40px;
  margin-top: -3px;
  overflow: hidden;
}

/* GRID */
.band {
  display: grid;
  justify-content: center;
}

.cell {
  width: 6px;
  height: 6px;
}

/* INSTRUCTIONS */
.instructions {
  max-width: 400px;
  margin: 20px auto;
  background: #eee;
  padding: 15px;
  border-radius: 10px;
  text-align: left;
  font-family: monospace;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>🧦 SockLab</h1>

<div class="controls">
  Size <input id="size" type="number" value="38" />
  Theme 
  <select id="theme">
    <option value="bee">Bee</option>
  </select>
  <br/>
  <button onclick="renderSock()">Generate Sock</button>
</div>

<!-- SOCK -->
<div class="sock-wrapper">
  <div id="leg" class="sock-leg"></div>
  <div id="heel" class="sock-heel"></div>
  <div id="foot" class="sock-foot"></div>
</div>

<div id="instructions" class="instructions"></div>

<script type="module">
import { generateSock } from "./src/generator/generator.js";
import { buildInstructions } from "./src/patterns/instructionBuilder.js";

const legContainer = document.getElementById("leg");
const heelContainer = document.getElementById("heel");
const footContainer = document.getElementById("foot");
const instructionsBox = document.getElementById("instructions");

function getInputs() {
  return {
    size: parseInt(document.getElementById("size").value),
    themeName: document.getElementById("theme").value
  };
}

window.renderSock = function () {

  const config = getInputs();
  const sock = generateSock(config);

  console.log("SOCK:", sock);

  legContainer.innerHTML = "";
  heelContainer.innerHTML = "";
  footContainer.innerHTML = "";

  const fullWidth = sock.castOn || 60;
  const width = Math.floor(fullWidth / 2);

  const ROUND_SCALE = 3;

  /* =========================
     CUFF
  ========================= */

  const cuff = document.createElement("div");
  cuff.className = "band";
  cuff.style.gridTemplateColumns = `repeat(${width}, 6px)`;

  for (let r = 0; r < 6; r++) {
    for (let i = 0; i < width; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.style.background = i % 2 === 0 ? "#bbb" : "#eee";
      cuff.appendChild(cell);
    }
  }

  legContainer.appendChild(cuff);

  /* =========================
     LEG PATTERNS
  ========================= */

  const leg = sock.sections?.leg || sock.structure || [];

  leg.forEach(pattern => {

    const chart = pattern.chart || [];
    if (!chart.length) return;

    const band = document.createElement("div");
    band.className = "band";

    const repeat = pattern.repeat || chart[0].length;
    const repeats = Math.floor(fullWidth / repeat);

    band.style.gridTemplateColumns = `repeat(${width}, 6px)`;

    const rows = Math.max(1, Math.floor((pattern.rounds || 6) / ROUND_SCALE));

    for (let r = 0; r < rows; r++) {
      chart.forEach(row => {

        let visualRow = "";

        for (let i = 0; i < repeats; i++) {
          visualRow += row;
        }

        visualRow = visualRow.slice(0, width);

        visualRow.split("").forEach(cell => {
          const div = document.createElement("div");
          div.className = "cell";

          div.style.background =
            cell === "X"
              ? pattern.colors?.[0] || "black"
              : pattern.colors?.[1] || "white";

          band.appendChild(div);
        });

      });
    }

    legContainer.appendChild(band);
  });

  /* =========================
     HEEL (subtiel)
  ========================= */

  const heelFill = document.createElement("div");
  heelFill.style.width = "100%";
  heelFill.style.height = "100%";
  heelFill.style.background = "#ddd";
  heelContainer.appendChild(heelFill);

  /* =========================
     FOOT
  ========================= */

  const foot = document.createElement("div");
  foot.style.height = "50px";
  foot.style.background = "#f0f0f0";
  footContainer.appendChild(foot);

  /* =========================
     TOE (tapered)
  ========================= */

  const toe = document.createElement("div");
  toe.className = "band";

  const toeRows = 12;
  let currentWidth = width;

  for (let r = 0; r < toeRows; r++) {

    if (r % 2 === 0 && currentWidth > 6) {
      currentWidth -= 2;
    }

    const empty = Math.floor((width - currentWidth) / 2);

    toe.style.gridTemplateColumns = `repeat(${width}, 6px)`;

    for (let i = 0; i < width; i++) {

      const cell = document.createElement("div");
      cell.className = "cell";

      if (i < empty || i >= width - empty) {
        cell.style.background = "transparent";
      } else {
        cell.style.background = "#ddd";
      }

      toe.appendChild(cell);
    }
  }

  footContainer.appendChild(toe);

  /* =========================
     INSTRUCTIONS
  ========================= */

  instructionsBox.textContent = buildInstructions(sock);
};

renderSock();
</script>

</body>
</html>
