<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>SockLab</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f5f5f5;
        }

        .controls {
            margin: 20px;
        }

        input,
        select,
        button {
            padding: 8px;
            margin: 5px;
        }

        .sock {
            width: 120px;
            margin: 20px auto;
            background: white;
            border: 3px solid #333;
            border-radius: 30px 30px 100px 100px;
            overflow: hidden;
        }

        .sock-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .sock-leg {
            width: 120px;
            background: white;
            border: 3px solid #333;
            border-bottom: none;
        }

        .sock-foot {
            width: 160px;
            height: 80px;
            background: white;
            border: 3px solid #333;
            border-radius: 0 40px 40px 0;
            margin-left: 40px;
        }

        .band {
            display: grid;
            justify-content: center;
        }

        .cell {
            width: 6px;
            height: 6px;
        }

        .instructions {
            max-width: 400px;
            margin: 20px auto;
            background: #eee;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>🧦 SockLab</h1>

    <div class="controls">
        Size
        <input id="size" type="number" value="38" />

        Theme
        <select id="theme">
            <option value="bee">Bee</option>
        </select>

        <br />

        <button onclick="renderSock()">Generate Sock</button>
    </div>

    <div class="sock-wrapper">
      <div id="leg" class="sock-leg"></div>
      <div id="foot" class="sock-foot"></div>
    </div>

    <div id="instructions" class="instructions"></div>

    <script type="module">
        import { generateSock } from "./src/generator/generator.js";
        import { buildInstructions } from "./src/patterns/instructionBuilder.js";

        const container = document.getElementById("sock");
        const instructionsBox = document.getElementById("instructions");

        function getInputs() {
            return {
                const legContainer = document.getElementById("leg");
                const footContainer = document.getElementById("foot");

                legContainer.innerHTML = "";
                footContainer.innerHTML = "";
                themeName: document.getElementById("theme").value
            };
        }

        window.renderSock = function () {

            const config = getInputs();
            const sock = generateSock(config);

            console.log("SOCK:", sock);

            container.innerHTML = "";

            const ROUND_SCALE = 3;

            // -------------------------
            // CUFF (RIBBING)
            // -------------------------
            const cuff = document.createElement("div");
            cuff.className = "band";

            const fullWidth = sock.castOn || 60;
            const cuffWidth = Math.floor(fullWidth / 2);

            cuff.style.gridTemplateColumns = `repeat(${cuffWidth}, 6px)`;

            const cuffRows = 6; // visueel (niet te hoog)

            for (let r = 0; r < cuffRows; r++) {
                for (let i = 0; i < cuffWidth; i++) {

                    const cell = document.createElement("div");
                    cell.className = "cell";

                    const isKnit = i % 2 === 0;

                    cell.style.background = isKnit ? "#bbb" : "#eee";

                    cuff.appendChild(cell);
                }
            }

            legContainer.appendChild(cuff);

            // -------------------------
            // LEG (COLORWORK)
            // -------------------------
            const leg = sock.sections?.leg || sock.structure || [];

            leg.forEach(pattern => {

                const chart = pattern.chart || [];
                if (!chart.length) return;

                const band = document.createElement("div");
                band.className = "band";

                const repeat = pattern.repeat || chart[0].length;
                const fullWidth = pattern.width || sock.castOn || repeat;
                const width = Math.floor(fullWidth / 2);
                const repeats = Math.floor(fullWidth / repeat);

                band.style.gridTemplateColumns = `repeat(${width}, 6px)`;

                const visualRows = Math.max(
                    1,
                    Math.floor((pattern.rounds || chart.length || 6) / ROUND_SCALE)
                );

                for (let r = 0; r < visualRows; r++) {
                    chart.forEach(row => {

                        for (let i = 0; i < repeats; i++) {

                            row.split("").forEach(cell => {
                                const div = document.createElement("div");
                                div.className = "cell";

                                div.style.background =
                                    cell === "X"
                                        ? pattern.colors?.[0] || "black"
                                        : pattern.colors?.[1] || "white";

                                band.appendChild(div);
                            });

                        }

                    });
                }

                legContainer.appendChild(band);
            });

            // -------------------------
            // HEEL
            // -------------------------
            const heel = document.createElement("div");
            heel.style.height = "40px";
            heel.style.background = "#ccc";
            container.appendChild(heel);

            // -------------------------
            // FOOT
            // -------------------------
            const foot = document.createElement("div");
            foot.style.height = "50px";
            foot.style.background = "#f0f0f0";
            footContainer.appendChild(foot);

            // -------------------------
            // TOE
            // -------------------------
            const toe = document.createElement("div");
            toe.className = "band";

            const toeWidthStart = Math.floor((sock.castOn || 60) / 2);
            const toeRows = 12; // hoogte van teen

            let currentWidth = toeWidthStart;

            for (let r = 0; r < toeRows; r++) {

                // elke 2 rijen minderen (zoals echte sok)
                if (r % 2 === 0 && currentWidth > 8) {
                    currentWidth -= 4; // 2 steken per kant
                }

                const empty = Math.floor((toeWidthStart - currentWidth) / 2);

                toe.style.gridTemplateColumns = `repeat(${toeWidthStart}, 6px)`;

                for (let i = 0; i < toeWidthStart; i++) {

                    const cell = document.createElement("div");
                    cell.className = "cell";

                    if (i < empty || i >= toeWidthStart - empty) {
                        cell.style.background = "transparent"; // buiten sok
                    } else {
                        cell.style.background = "#ddd"; // teen kleur
                    }

                    toe.appendChild(cell);
                }
            }

            footContainer.appendChild(toe);

            // -------------------------
            // INSTRUCTIONS
            // -------------------------
            instructionsBox.textContent = buildInstructions(sock);
        };

        // auto render bij laden
        renderSock();

    </script>

</body>

</html>
